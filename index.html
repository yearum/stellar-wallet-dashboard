<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Wallet Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="header">
        <h1>🚀 Stellar Wallet Dashboard</h1>
        <span class="badge">Stellar Testnet</span>
    </div>

    <div class="actions">

        <button onclick="connectWallet()">
            Connect Freighter
        </button>

        <button onclick="disconnectWallet()">
            Disconnect
        </button>

        <button onclick="checkBalance()">
            Refresh Balance
        </button>

    </div>

    <div class="card">

        <h3>Status</h3>
        <p id="walletStatus">❌ Disconnected</p>

        <h3>Wallet Address</h3>
        <p id="accountId">-</p>

        <h3>Balance</h3>
        <p id="balance">-</p>

        <h3>Last Updated</h3>
        <p id="lastUpdated">-</p>

    </div>

    <div class="card">

        <h3>Recent Transactions</h3>

        <ul id="transactions">
            <li>No transactions loaded</li>
        </ul>

    </div>

    <div class="card">

        <h3>Send XLM</h3>

        <input
            type="text"
            id="destination"
            placeholder="Destination Address">

        <input
            type="number"
            id="amount"
            placeholder="Amount XLM">

        <button onclick="sendXLM()">
            Send XLM
        </button>

        <p id="txResult"></p>

    </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
