<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Wallet Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <div class="header">
            <h1>🚀 Stellar Wallet Dashboard</h1>
            <span class="badge">Stellar Testnet</span>
        </div>

        <input
            type="text"
            id="walletAddress"
            placeholder="Masukkan Public Key Stellar">

        <div class="actions">

            <button onclick="loadDemoWallet()">
                Load Demo Wallet
            </button>

            <button onclick="checkBalance()">
                Check Balance
            </button>

            <button onclick="resetDashboard()">
                Reset
            </button>

        </div>

        <div class="card">

            <h3>Status</h3>
            <p id="walletStatus">❌ Belum Dicek</p>

            <h3>Wallet Address</h3>
            <p id="accountId">-</p>

            <h3>Balance</h3>
            <p id="balance">-</p>

            <h3>Last Updated</h3>
            <p id="lastUpdated">-</p>

        </div>

        <div class="card">

            <h3>Recent Transactions</h3>

            <ul id="transactions">
                <li>No transactions loaded</li>
            </ul>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
